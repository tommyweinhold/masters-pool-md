  .g-search:focus { outline: none; border-color: #4a8a5a; }
  .g-option { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-family: sans-serif; font-size: 13px; color: #c8d8c0; display: flex; justify-content: space-between; align-items: center; }
  .g-option:hover { background: rgba(255,255,255,0.05); }
  .g-tier { font-size: 11px; color: #6a9478; }
  .slot-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 6px; }
  .slot-num { font-size: 11px; color: #6a9478; min-width: 16px; font-family: sans-serif; }

  .team-mini-block { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .team-mini-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .team-mini-name { font-size: 13px; color: #c9a84c; font-family: sans-serif; font-weight: 600; }
  .team-mini-edit { background: rgba(201,168,76,0.13); border: 1px solid rgba(201,168,76,0.28); border-radius: 6px; padding: 3px 9px; color: #c9a84c; font-size: 11px; cursor: pointer; font-family: sans-serif; }
  .team-mini-golfers { font-size: 12px; color: #8ab49a; font-family: sans-serif; line-height: 1.5; }
  .excel-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #6a9478; font-family: sans-serif; margin-bottom: 8px; }
  .excel-ok { color: #5cb878; }
  .excel-err { color: #e06060; }
</style>

<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span style="font-size:22px;">⛳</span>
      <div>
        <div class="header-title">2026 Masters Pool</div>
        <div class="header-sub" id="tourn-status">Augusta National · Apr 9–13</div>
      </div>
    </div>
    <div class="pot-strip">
      <div class="pot-row">
        <span class="pot-label">Total Pot</span>
        <span class="pot-total" id="pot-total">$0</span>
      </div>
      <div class="payouts" id="payouts-row"></div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-lb" onclick="switchTab('lb')">🏌️ Leaderboard</div>
    <div class="tab" id="tab-teams" onclick="switchTab('teams')">👥 Teams</div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Loading live scores…</div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

<script>
/* ─── POOL CONFIG (overridden by pool.xlsx if present) ─── */
const POOL = {
  participants  : ['Tommy','Grant','Gavin','Caleb','Will','Ethan'],
  golfersPerTeam: 5,
  payouts       : [0.80, 0.20],
};

const FIELD = [
  {name:'Scottie Scheffler',tier:1},{name:'Jon Rahm',tier:1},{name:'Rory McIlroy',tier:1},{name:'Bryson DeChambeau',tier:1},
  {name:'Ludvig Aberg',tier:2},{name:'Xander Schauffele',tier:2},{name:'Cameron Young',tier:2},{name:'Tommy Fleetwood',tier:2},
  {name:'Matt Fitzpatrick',tier:2},{name:'Collin Morikawa',tier:2},{name:'Justin Rose',tier:2},{name:'Jordan Spieth',tier:2},
  {name:'Brooks Koepka',tier:2},{name:'Hideki Matsuyama',tier:2},
  {name:'Robert MacIntyre',tier:3},{name:'Russell Henley',tier:3},{name:'Chris Gotterup',tier:3},{name:'Patrick Reed',tier:3},
  {name:'Viktor Hovland',tier:3},{name:'Si Woo Kim',tier:3},{name:'Min Woo Lee',tier:3},{name:'Justin Thomas',tier:3},
  {name:'Patrick Cantlay',tier:3},{name:'Adam Scott',tier:3},{name:'Akshay Bhatia',tier:3},{name:'Sepp Straka',tier:3},
  {name:'Tyrrell Hatton',tier:3},{name:'Jason Day',tier:3},{name:'Jake Knapp',tier:3},{name:'Shane Lowry',tier:3},
  {name:'Sam Burns',tier:4},{name:'Corey Conners',tier:4},{name:'Nicolai Hojgaard',tier:4},{name:'J.J. Spaun',tier:4},
  {name:'Kurt Kitayama',tier:4},{name:'Jacob Bridgeman',tier:4},{name:'Maverick McNealy',tier:4},
  {name:'Matthew McCarty',tier:5},{name:'Cameron Smith',tier:5},{name:'Harris English',tier:5},{name:'Ben Griffin',tier:5},
  {name:'Daniel Berger',tier:5},{name:'Gary Woodland',tier:5},{name:'Max Homa',tier:5},{name:'Sungjae Im',tier:5},
  {name:'Rasmus Hojgaard',tier:5},{name:'Keegan Bradley',tier:5},{name:'Marco Penge',tier:5},{name:'Harry Hall',tier:5},
  {name:'Alexander Noren',tier:5},{name:'Ryan Gerard',tier:5},{name:'Aaron Rai',tier:5},{name:'Nick Taylor',tier:5},
  {name:'Brian Harman',tier:5},
  {name:'Sam Stevens',tier:6},{name:'Ryan Fox',tier:6},{name:'Wyndham Clark',tier:6},{name:'Sergio Garcia',tier:6},
  {name:'Max Greyserman',tier:6},{name:'Dustin Johnson',tier:6},{name:'Casey Jarvis',tier:6},
  {name:'Nicolas Echavarria',tier:6},{name:'Hao-Tong Li',tier:6},{name:'Tom McKibbin',tier:6},
];

/* ─── STATE ─── */
let S = {
  tab:'lb', leaderboard:[], teams:{}, myTeam:null,
  starred:new Set(), expanded:new Set(),
  lastUpdated:null, isLive:false,
  excelLoaded:false, excelError:null,
  sourceLabel:'', roundLabel:'',
};

/* ─── LOCAL STORAGE ─── */
function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('masters26_prefs') || '{}');
    if (p.myTeam)  S.myTeam  = p.myTeam;
    if (p.starred) S.starred = new Set(p.starred);
    if (p.teams) Object.entries(p.teams).forEach(([k,v]) => {
      if (!S.teams[k]) S.teams[k] = {};
      if (v.golfers?.length) S.teams[k].golfers = v.golfers;
      if (v.bid)             S.teams[k].bid     = v.bid;
    });
  } catch(e) {}
}
function savePrefs() {
  try { localStorage.setItem('masters26_prefs', JSON.stringify({myTeam:S.myTeam,starred:[...S.starred],teams:S.teams})); } catch(e) {}
}

/* ─── EXCEL LOADER ─── */
async function loadPoolFromExcel() {
  try {
    const resp = await fetch('./pool.xlsx', { cache:'no-cache' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf = await resp.arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });
    const settingsWs = wb.Sheets['Pool Settings'];
    if (settingsWs) {
      const rows = XLSX.utils.sheet_to_json(settingsWs, { header:1 });
      const pays = [parseFloat(rows[6]?.[2]), parseFloat(rows[7]?.[2]), parseFloat(rows[8]?.[2])].filter(x=>x>0);
      if (pays.length) POOL.payouts = pays;
      const names = rows.slice(14,20).map(r=>r[1]).filter(Boolean);
      if (names.length) POOL.participants = names;
    }
    const draftWs = wb.Sheets['Auction Draft'];
    if (draftWs) {
      const rows = XLSX.utils.sheet_to_json(draftWs, { header:1 });
      rows.slice(4).forEach(row => {
        const name = row[1]; if (!name || typeof name !== 'string') return;
        const golfers = [row[2],row[4],row[6],row[8],row[10]].map(g=>typeof g==='string'?g.trim():'').filter(Boolean);
        const totalBid = [row[3],row[5],row[7],row[9],row[11]].reduce((a,b)=>a+(parseFloat(b)||0),0);
        if (!S.teams[name]) S.teams[name] = {};
        if (golfers.length) S.teams[name].golfers = golfers;
        if (totalBid > 0)   S.teams[name].bid     = totalBid;
      });
    }
    S.excelLoaded = true; S.excelError = null;
  } catch(err) { S.excelError = err.message; S.excelLoaded = false; }
}

/* ═══════════════════════════════════════════════════════════════════
   LIVE DATA FETCHING
   
   The problem: ESPN's API returns no CORS headers, so browsers
   block direct fetch() calls from a GitHub Pages site.
   
   Solution: Try multiple approaches in priority order:
   
   1. masters.com/scores.json  — official live feed, CORS-open
   2. ESPN via allorigins.win  — free CORS proxy wrapping ESPN
   3. ESPN via corsproxy.io    — backup CORS proxy  
   4. masters.com via allorigins — proxy fallback for masters.com
   
   All four parse into the same internal format.
════════════════════════════════════════════════════════════════════ */

async function fetchLiveScores() {

  /* ── 1. masters.com official JSON feed (best option, no proxy needed) ── */
  try {
    const r = await fetch('https://www.masters.com/en_US/scores/feeds/2026/scores.json', {
      signal: AbortSignal.timeout(8000)
    });
    if (r.ok) {
      const text = await r.text();
      const d = safeParseJSON(text);
      if (d && parseMastersFeed(d)) { S.sourceLabel = 'Masters.com'; return true; }
    }
  } catch(e) { /* try next */ }

  /* ── 2. ESPN leaderboard via allorigins.win CORS proxy ── */
  try {
    const target = 'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?season=2026';
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`, {
      signal: AbortSignal.timeout(12000)
    });
    if (r.ok) {
      const wrapper = await r.json();
      const d = safeParseJSON(wrapper.contents);
      if (d && parseESPNFeed(d)) { S.sourceLabel = 'ESPN'; return true; }
    }
  } catch(e) { /* try next */ }

  /* ── 3. ESPN via corsproxy.io ── */
  try {
    const target = 'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?season=2026';
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`, {
      signal: AbortSignal.timeout(12000)
    });
    if (r.ok) {
      const d = await r.json();
      if (d && parseESPNFeed(d)) { S.sourceLabel = 'ESPN'; return true; }
    }
  } catch(e) { /* try next */ }

  /* ── 4. masters.com via allorigins proxy ── */
  try {
    const target = 'https://www.masters.com/en_US/scores/feeds/2026/scores.json';
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`, {
      signal: AbortSignal.timeout(12000)
    });
    if (r.ok) {
      const wrapper = await r.json();
      const d = safeParseJSON(wrapper.contents);
      if (d && parseMastersFeed(d)) { S.sourceLabel = 'Masters.com'; return true; }
    }
  } catch(e) { /* try next */ }

  return false;
}

function safeParseJSON(text) {
  if (!text) return null;
  try {
    // Strip JSONP wrapper if present (e.g. "callback({...})")
    const clean = text.trim().replace(/^[a-zA-Z_$][a-zA-Z0-9_$]*\s*\(/, '').replace(/\);?\s*$/, '');
    return JSON.parse(clean);
  } catch(e) {
    try { return JSON.parse(text); } catch(e2) { return null; }
  }
}

/* Parse masters.com scores.json */
function parseMastersFeed(d) {
  // Masters.com feed: top-level has data.player[] or player[]
  const players = d?.data?.player || d?.player || [];
  if (!Array.isArray(players) || !players.length) return false;

  const roundNum = d?.data?.roundNumber || d?.roundNumber || '';
  S.roundLabel = roundNum ? `Round ${roundNum}` : '';

  S.leaderboard = players.map(p => {
    const statusStr = (p.status || p.positionDesc || p.pos || '').toString().toLowerCase();
    const isCut = statusStr.includes('cut') || statusStr === 'wd' || statusStr === 'dq';

    // Position — masters uses "pos" like "T3", "1", "CUT"
    const posRaw = (p.pos || p.position || '').toString();
    const posNum  = parseInt(posRaw.replace(/[^0-9]/g,'')) || 999;
    const placeTxt = isCut ? 'CUT' : posRaw;

    // Score to par — masters uses overallPar (string like "-7", "+2", "E")
    const parStr = (p.overallPar ?? p.topar ?? p.total ?? '0').toString().trim();
    const total  = parStr === 'E' ? 0 : parseInt(parStr) || 0;

    // Round scores from rounds[] array
    const rounds = Array.isArray(p.rounds) ? p.rounds : [];
    const r1 = rounds[0]?.strokes || p.round1 || null;
    const r2 = rounds[1]?.strokes || p.round2 || null;
    const r3 = rounds[2]?.strokes || p.round3 || null;
    const r4 = rounds[3]?.strokes || p.round4 || null;

    // Current hole / thru
    const thruRaw = p.thru ?? p.hole ?? null;
    const thru = thruRaw == null ? null
               : (thruRaw == 18 || thruRaw === 'F') ? 'F'
               : `Thru ${thruRaw}`;

    // Name
    const first = p.firstName || p.first_name || '';
    const last  = p.lastName  || p.last_name  || '';
    const name  = p.displayName || p.playerName || p.fullName || `${first} ${last}`.trim();

    return { name, place: isCut ? 9999 : posNum, placeTxt, total, r1, r2, r3, r4, thru, isCut };
  }).filter(p => p.name).sort((a,b) => {
    if (a.isCut !== b.isCut) return a.isCut ? 1 : -1;
    return a.place - b.place || a.total - b.total;
  });

  if (!S.leaderboard.length) return false;
  S.isLive = true;
  S.lastUpdated = new Date();
  return true;
}

/* Parse ESPN leaderboard API JSON */
function parseESPNFeed(d) {
  const events = d?.events || [];
  const event  = events.find(e =>
    (e.name||'').toLowerCase().includes('masters') ||
    (e.shortName||'').toLowerCase().includes('masters')
  ) || events[0];
  if (!event) return false;

  const comp        = (event.competitions || [])[0];
  const competitors = comp?.competitors || [];
  if (!competitors.length) return false;

  S.roundLabel = comp?.status?.type?.description || '';

  S.leaderboard = competitors.map(c => {
    const athlete = c.athlete || {};
    const name    = athlete.displayName || athlete.fullName || '';
    const ls      = c.linescores || [];
    const rounds  = ls.map(x => x.value ?? x.displayValue ?? null);
    const total   = parseInt(c.score ?? 0) || 0;
    const posTxt  = c.status?.position?.displayName || '';
    const pos     = parseInt(c.status?.position?.id || c.place || 99) || 99;
    const isCut   = /cut/i.test(c.status?.type?.name||'') || /cut/i.test(posTxt);
    const thruRaw = c.status?.thru ?? null;
    const thru    = thruRaw == null ? null : (thruRaw === 18 ? 'F' : `Thru ${thruRaw}`);

    return {
      name, place: isCut?9999:pos, placeTxt: isCut?'CUT':(posTxt||String(pos)),
      total, r1:rounds[0]??null, r2:rounds[1]??null, r3:rounds[2]??null, r4:rounds[3]??null,
      thru, isCut,
    };
  }).filter(p => p.name).sort((a,b) => {
    if (a.isCut !== b.isCut) return a.isCut ? 1 : -1;
    return a.place - b.place;
  });

  if (!S.leaderboard.length) return false;
  S.isLive = true;
  S.lastUpdated = new Date();
  return true;
}

/* ─── HELPERS ─── */
function getPot() { return Object.values(S.teams).reduce((s,t)=>s+(t.bid||0),0); }
function getPrizes() { const pot=getPot(); return POOL.payouts.map((pct,i)=>({place:i+1,pct,amount:pot*pct})); }
function matchGolfer(name) {
  if (!name) return null;
  const tn=name.toLowerCase().trim();
  return S.leaderboard.find(g=>{
    const gn=g.name.toLowerCase().trim();
    if(gn===tn) return true;
    const gL=gn.split(' ').pop(), tL=tn.split(' ').pop();
    return gL===tL && gL.length>3;
  });
}
function nameLookup(a,b) {
  if(!a||!b) return false;
  const an=a.toLowerCase().trim(), bn=b.toLowerCase().trim();
  if(an===bn) return true;
  const aL=an.split(' ').pop(), bL=bn.split(' ').pop();
  return aL===bL && aL.length>3;
}
function calcEarnings(g) {
  if(!g||g.isCut) return 0;
  const prizes=getPrizes();
  if(g.place===1) return prizes[0]?.amount||0;
  if(g.place===2) return prizes[1]?.amount||0;
  if(g.place===3) return prizes[2]?.amount||0;
  return 0;
}
function fmtScore(t,isCut) { if(isCut)return'CUT'; const n=parseInt(t); if(isNaN(n)||n===0)return'E'; return n<0?String(n):'+'+n; }
function scoreClass(t,isCut) { if(isCut)return'sc-cut'; const n=parseInt(t); if(isNaN(n)||n===0)return'sc-even'; return n<0?'sc-under':'sc-over'; }
function placeClass(p,isCut) { if(isCut)return'pCT'; if(p===1)return'p1'; if(p===2)return'p2'; if(p===3)return'p3'; return'pN'; }
function fmtMoney(n) { return '$'+Math.round(n).toLocaleString(); }

function renderPotStrip() {
  const pot=getPot();
  document.getElementById('pot-total').textContent='$'+pot.toLocaleString();
  const labels=['🥇 1st','🥈 2nd','🥉 3rd'];
  document.getElementById('payouts-row').innerHTML=getPrizes().map((p,i)=>
    `<div class="payout-badge"><div class="payout-place">${labels[i]}</div><div class="payout-amt">$${Math.round(p.amount).toLocaleString()}</div></div>`
  ).join('');
  if (S.roundLabel) document.getElementById('tourn-status').textContent=`Augusta · ${S.roundLabel}`;
}

function render() { renderPotStrip(); S.tab==='lb'?renderLeaderboard():renderTeams(); }
function switchTab(tab) {
  S.tab=tab;
  document.getElementById('tab-lb').classList.toggle('active',tab==='lb');
  document.getElementById('tab-teams').classList.toggle('active',tab==='teams');
  render();
}

/* ─── LEADERBOARD TAB ─── */
function renderLeaderboard() {
  const starred=[...S.starred];
  const dotHtml=S.isLive?'<span class="live-dot"></span>':'<span class="demo-dot"></span>';
  const label=S.isLive?`<span class="source-badge badge-live">Live · ${S.sourceLabel}</span>`:`<span class="source-badge badge-demo">Demo Data</span>`;
  const time=S.lastUpdated?S.lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  let html=`<div class="status-bar">
    <div class="status-left">${dotHtml}<span class="status-time">${time}</span>${label}</div>
    <button class="refresh-btn" onclick="doRefresh()">↻ Refresh</button>
  </div>`;

  if (!S.isLive) {
    html+=`<div class="info-banner">⛳ <strong>Showing demo data.</strong> Live scores load automatically when the Masters is underway. Tap Refresh to try again.</div>`;
  }

  const sorted=[...S.leaderboard];
  if (starred.length) {
    const mine=sorted.filter(g=>starred.some(s=>nameLookup(g.name,s)));
    if (mine.length) { html+='<div class="section-label">⭐ My Team</div>'; mine.forEach(g=>{html+=golferRowHtml(g,true);}); html+='<div class="section-label">Full Field</div>'; }
    sorted.forEach(g=>{ if(!starred.some(s=>nameLookup(g.name,s))) html+=golferRowHtml(g,false); });
  } else {
    sorted.forEach(g=>{html+=golferRowHtml(g,false);});
  }
  document.getElementById('content').innerHTML=html;
}

function golferRowHtml(g, isStarred) {
  const earn=calcEarnings(g);
  const earnHtml=earn>0?`<div class="golfer-earn">${fmtMoney(earn)}</div>`:'';
  const rounds=[g.r1,g.r2,g.r3,g.r4].filter(r=>r!=null&&r!==''&&r!=='-');
  const roundStr=rounds.length?rounds.join(' · '):'–';
  const thruHtml=(g.thru&&!g.isCut)?`<span class="thru-pill">${g.thru}</span>`:'';
  const safeNm=g.name.replace(/'/g,"\\'");
  return `<div class="golfer-row ${isStarred?'starred':''}">
    <div class="place-badge ${placeClass(g.place,g.isCut)}">${g.placeTxt||g.place}</div>
    <div class="golfer-info">
      <div class="golfer-name">${g.name}${thruHtml}</div>
      <div class="golfer-meta">${roundStr}</div>
    </div>
    <div class="golfer-right">
      <div class="golfer-total ${scoreClass(g.total,g.isCut)}">${fmtScore(g.total,g.isCut)}</div>
      ${earnHtml}
    </div>
    <button class="star-btn ${isStarred?'on':''}" onclick="toggleStar('${safeNm}')">★</button>
  </div>`;
}
function toggleStar(name){S.starred.has(name)?S.starred.delete(name):S.starred.add(name);savePrefs();render();}

/* ─── TEAMS TAB ─── */
function calcTeamEarnings(pName) {
  const t=S.teams[pName]; if(!t?.golfers) return 0;
  return t.golfers.filter(Boolean).reduce((sum,g)=>{const gd=matchGolfer(g);return sum+(gd?calcEarnings(gd):0);},0);
}
function renderTeams() {
  let html='';
  if (S.excelLoaded) html+=`<div class="excel-status"><span class="excel-ok">✓</span> Rosters loaded from pool.xlsx</div>`;
  else if (S.excelError) html+=`<div class="excel-status"><span class="excel-err">!</span> pool.xlsx not found — use manual rosters</div>`;
  html+=`<button class="config-btn" onclick="openSettingsModal()">⚙️ Configure Pot &amp; Rosters</button>`;
  const hasRosters=Object.values(S.teams).some(t=>t.golfers?.some(Boolean));
  if (!hasRosters) html+=`<div class="info-banner"><strong>Set up your pool!</strong><br>Add the total pot and each team's golfers. Or fill in pool.xlsx and upload it to GitHub.</div>`;

  const teamList=POOL.participants.map(name=>({name,team:S.teams[name]||{golfers:[]},earnings:calcTeamEarnings(name)})).sort((a,b)=>b.earnings-a.earnings||a.name.localeCompare(b.name));
  teamList.forEach((t,i)=>{
    const rank=i+1,isMyTeam=S.myTeam===t.name,isExpanded=S.expanded.has(t.name);
    const golfers=(t.team.golfers||[]).filter(Boolean),safeNm=t.name.replace(/'/g,"\\'");
    html+=`<div class="team-card ${isMyTeam?'my-team':''}">
      <div class="team-header" onclick="toggleExpand('${safeNm}')">
        <div class="team-rank ${placeClass(rank,false)}">${rank}</div>
        <div class="team-name-label">${t.name}${isMyTeam?'<span class="me-chip">Me</span>':''}</div>
        <div class="team-earn-col">
          <div class="team-earn-num">${golfers.length?(t.earnings>0?fmtMoney(t.earnings):'$0'):'—'}</div>
          <div class="team-earn-sub">${golfers.length} golfer${golfers.length!==1?'s':''}</div>
        </div>
        <button class="my-star-btn ${isMyTeam?'on':''}" onclick="event.stopPropagation();setMyTeam('${safeNm}')">★</button>
        <span class="chevron ${isExpanded?'open':''}">▾</span>
      </div>`;
    if (isExpanded) {
      html+=`<div class="team-body">`;
      if(!golfers.length){
        html+=`<div style="padding:12px 14px;font-size:13px;color:#6a9478;font-family:sans-serif;">No roster yet · <span style="color:#c9a84c;cursor:pointer;" onclick="openTeamEdit('${safeNm}')">Add golfers</span></div>`;
      } else {
        golfers.forEach(gname=>{
          const gd=matchGolfer(gname),earn=gd?calcEarnings(gd):0;
          html+=`<div class="tg-row">
            <div class="mini-badge ${gd?placeClass(gd.place,gd.isCut):'pN'}">${gd?gd.placeTxt:'?'}</div>
            <div class="tg-name">${gname}</div>
            <div class="tg-score ${gd?scoreClass(gd.total,gd.isCut):'sc-even'}">${gd?fmtScore(gd.total,gd.isCut):'—'}</div>
            <div class="tg-earn">${earn>0?fmtMoney(earn):''}</div>
          </div>`;
        });
      }
      html+=`<span class="team-edit-link" onclick="openTeamEdit('${safeNm}')">✏️ Edit roster</span></div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('content').innerHTML=html;
}
function toggleExpand(name){S.expanded.has(name)?S.expanded.delete(name):S.expanded.add(name);render();}
function setMyTeam(name){if(S.myTeam===name){S.myTeam=null;S.starred=new Set();}else{S.myTeam=name;S.starred=new Set((S.teams[name]?.golfers||[]).filter(Boolean));}savePrefs();render();}

/* ─── MODALS ─── */
function openSettingsModal(){
  const pot=getPot();
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-title">Pool Settings <button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-label">Total Pot ($)</div>
    <input class="modal-input" id="inp-pot" type="number" placeholder="e.g. 300" value="${pot||''}">
    <div style="margin:16px 0 10px;font-size:12px;color:#8ab49a;text-transform:uppercase;letter-spacing:0.8px;font-family:sans-serif;">Team Rosters</div>
    ${POOL.participants.map(p=>{
      const golfers=(S.teams[p]?.golfers||[]).filter(Boolean),safePp=p.replace(/'/g,"\\'");
      return `<div class="team-mini-block">
        <div class="team-mini-header"><span class="team-mini-name">${p}</span><button class="team-mini-edit" onclick="openTeamEdit('${safePp}')">Edit</button></div>
        <div class="team-mini-golfers">${golfers.length?golfers.join(' &nbsp;·&nbsp; '):'<span style="color:#3a5a4a;font-style:italic;">No golfers set</span>'}</div>
      </div>`;
    }).join('')}
    <button class="modal-btn" onclick="savePot()">Save</button>`;
  document.getElementById('modal-overlay').style.display='flex';
}
function savePot(){
  const pot=parseFloat(document.getElementById('inp-pot')?.value)||0;
  if(pot>0){const share=pot/POOL.participants.length;POOL.participants.forEach(p=>{if(!S.teams[p])S.teams[p]={golfers:[]};S.teams[p].bid=share;});}
  savePrefs();closeModal();render();
}
function openTeamEdit(participant){
  let selected=[...(S.teams[participant]?.golfers||[]).filter(Boolean)];
  function draw(){
    const sv=document.getElementById('g-search')?.value||'';
    const avail=FIELD.filter(g=>!selected.includes(g.name)&&g.name.toLowerCase().includes(sv.toLowerCase()));
    document.getElementById('modal-body').innerHTML=`
      <div class="modal-title">${participant}'s Team <button class="modal-close" onclick="openSettingsModal()">←</button></div>
      <div style="margin-bottom:12px;">
        ${Array.from({length:POOL.golfersPerTeam},(_,i)=>`<div class="slot-row"><span class="slot-num">${i+1}</span>${selected[i]?`<span class="slot-name filled">${selected[i]}</span><button class="slot-rm" onclick="rmG(${i})">×</button>`:`<span class="slot-name empty">Empty slot</span>`}</div>`).join('')}
      </div>
      ${selected.length<POOL.golfersPerTeam?`
        <div class="modal-label">Add Golfer (${selected.length}/${POOL.golfersPerTeam})</div>
        <input class="g-search" id="g-search" placeholder="Search by name…" oninput="redrawList()" value="${sv}" autocomplete="off">
        <div id="g-list" style="max-height:230px;overflow-y:auto;">
          ${avail.slice(0,40).map(g=>`<div class="g-option" onclick="addG('${g.name.replace(/'/g,"\\'")}')"><span>${g.name}</span><span class="g-tier">Tier ${g.tier}</span></div>`).join('')}
        </div>`:`<div style="font-size:13px;color:#5cb878;font-family:sans-serif;padding:10px 0;text-align:center;">✓ Roster complete!</div>`}
      <button class="modal-btn" onclick="saveRoster()">Save Roster</button>
      <button class="modal-btn-secondary" onclick="openSettingsModal()">Back</button>`;
    const el=document.getElementById('g-search');
    if(el&&sv){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
  }
  window.addG=name=>{if(selected.length<POOL.golfersPerTeam&&!selected.includes(name)){selected.push(name);draw();}};
  window.rmG=i=>{selected.splice(i,1);draw();};
  window.redrawList=()=>{
    const sv=document.getElementById('g-search')?.value||'';
    const avail=FIELD.filter(g=>!selected.includes(g.name)&&g.name.toLowerCase().includes(sv.toLowerCase()));
    document.getElementById('g-list').innerHTML=avail.slice(0,40).map(g=>`<div class="g-option" onclick="addG('${g.name.replace(/'/g,"\\'")}')"><span>${g.name}</span><span class="g-tier">Tier ${g.tier}</span></div>`).join('');
  };
  window.saveRoster=()=>{
    if(!S.teams[participant])S.teams[participant]={golfers:[],bid:0};
    S.teams[participant].golfers=selected;
    if(S.myTeam===participant)S.starred=new Set(selected);
    savePrefs();openSettingsModal();render();
  };
  draw();
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}

/* ─── REFRESH ─── */
async function doRefresh(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>Fetching live scores…</div>';
  S.isLive=false;
  const ok=await fetchLiveScores();
  if(!ok) useDemoData();
  render();
}

/* ─── INIT ─── */
async function init(){
  loadPrefs();
  await loadPoolFromExcel();
  loadPrefs();
  renderPotStrip();
  const ok=await fetchLiveScores();
  if(!ok) useDemoData();
  render();
  // Auto-refresh every 90s when tab is visible
  setInterval(async()=>{
    if(document.hidden) return;
    const ok=await fetchLiveScores();
    render();
  }, 90000);
}

init();
